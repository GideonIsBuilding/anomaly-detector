services:

  # ── Nextcloud
  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: nextcloud
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - nextcloud-data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    networks:
      - hng-net

  # ── Nginx
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    networks:
      - hng-net

  # ── Anomaly
  detector:
    build:
      context: ./detector
      dockerfile: Dockerfile
    container_name: detector
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - ./detector/audit:/var/log/detector
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    depends_on:
      - nginx

volumes:
  HNG-nginx-logs:
    name: HNG-nginx-logs
  nextcloud-data:

networks:
  hng-net:
    driver: bridge